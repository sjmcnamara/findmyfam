coverage:
  status:
    project:
      # Disable the misleading blended total — it mixes three platforms
      # whose source trees barely overlap, producing a meaningless number.
      default:
        informational: true
      # Per-flag project status — these are the numbers that matter.
      ios:
        informational: true
        flags:
          - ios
      whistlecore:
        informational: true
        flags:
          - whistlecore
      android:
        informational: true
        flags:
          - android
    patch:
      default:
        # Informational only — no PR block
        informational: true

comment:
  layout: "reach,diff,flags,files"
  behavior: default        # post once, update on new commits
  require_changes: true    # only comment if coverage actually changed

flags:
  ios:
    paths:
      - Sources/
      - WhistleTests/
    carryforward: true     # keep last result if job didn't run
  whistlecore:
    paths:
      - WhistleCore/Sources/
    carryforward: true
  android:
    paths:
      - android/app/src/main/
    carryforward: true

ignore:
  - "**/*Tests*"
  - "**/*.generated.swift"
  - "WhistleCore/.build/"
  - "*.xcresult"
  # Android — Compose UI screens/components (require instrumentation tests, not JUnit)
  - "android/app/src/main/java/org/findmyfam/ui/**"
  - "android/app/src/main/java/org/findmyfam/MainActivity.kt"
  - "android/app/src/main/java/org/findmyfam/FindMyFamApp.kt"
  - "android/app/src/main/java/org/findmyfam/di/**"
  # Android — auto-generated UniFFI bindings (5000+ lines, not testable)
  - "android/app/src/main/java/build/**"
  # Android — thin FFI / SDK wrappers (delegate to native libs, not unit-testable)
  - "android/app/src/main/java/org/findmyfam/services/MLSService.kt"
  - "android/app/src/main/java/org/findmyfam/services/RelayService.kt"
  - "android/app/src/main/java/org/findmyfam/services/LocationService.kt"
  - "android/app/src/main/java/org/findmyfam/services/IdentityService.kt"
  # Android — MarmotService (900+ line orchestrator tightly coupled to MLS/Relay FFI)
  - "android/app/src/main/java/org/findmyfam/services/MarmotService.kt"
  # Android — ViewModels (lifecycle-coupled, require instrumentation or Robolectric)
  - "android/app/src/main/java/org/findmyfam/viewmodels/**"
  # Android — Hilt generated code
  - "android/**/hilt_aggregated_deps/**"
  - "android/**/*_HiltComponents*"
  - "android/**/*_Factory*"
