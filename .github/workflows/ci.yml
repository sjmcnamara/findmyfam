name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only. Jobs that need write access declare it explicitly.
permissions: read-all

jobs:
  # ──────────────────────────────────────────────
  # iOS — WhistleCore SPM Tests (pure Swift, fast)
  # ──────────────────────────────────────────────
  ios-core-tests:
    name: WhistleCore Tests
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Run SPM tests
        run: cd WhistleCore && swift test --enable-code-coverage

      - name: Generate coverage report
        continue-on-error: true
        working-directory: WhistleCore
        run: |
          BIN_PATH=$(swift build --show-bin-path 2>/dev/null)
          PROFDATA="${BIN_PATH}/codecov/default.profdata"
          BUNDLE=$(find "${BIN_PATH}" -name "*.xctest" -print -quit 2>/dev/null)
          if [ -f "$PROFDATA" ] && [ -n "$BUNDLE" ]; then
            EXEC="${BUNDLE}/Contents/MacOS/$(basename "${BUNDLE}" .xctest)"
            xcrun llvm-cov export "$EXEC" \
              -instr-profile="$PROFDATA" \
              -format=lcov \
              --ignore-filename-regex="\.build|Tests" \
              > coverage.lcov
          else
            echo "Coverage data not found — skipping"
          fi

      - uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe  # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: WhistleCore/coverage.lcov
          flags: whistlecore
          fail_ci_if_error: false

  # ──────────────────────────────────────────────
  # iOS — Full app build + test
  # ──────────────────────────────────────────────
  ios-tests:
    name: iOS Build & Test
    runs-on: macos-15
    permissions:
      contents: read
      actions: write  # upload-artifact
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Generate Xcode project
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Build & Test
        run: |
          xcodebuild test \
            -project Whistle.xcodeproj \
            -scheme Whistle \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -only-testing:WhistleTests \
            -resultBundlePath TestResults.xcresult \
            -enableCodeCoverage YES \
            | xcpretty --color || true

      - name: Generate coverage report
        run: |
          xcrun xccov view --report --json TestResults.xcresult > coverage.json

      - uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe  # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.json
          flags: ios
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        if: failure()
        with:
          name: ios-test-results
          path: TestResults.xcresult

  # ──────────────────────────────────────────────
  # Android — Unit tests (shared + app)
  # ──────────────────────────────────────────────
  android-tests:
    name: Android Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write  # upload-artifact
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Shared module tests
        working-directory: android
        run: ./gradlew :shared:test

      - name: App unit tests
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest

      - name: Generate coverage report
        working-directory: android
        run: ./gradlew :app:createDebugUnitTestCoverageReport

      - uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe  # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: android/app/build/reports/coverage/test/debug/report.xml
          flags: android
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        if: failure()
        with:
          name: android-test-results
          path: android/app/build/reports/tests/

  # ──────────────────────────────────────────────
  # SwiftLint
  # ──────────────────────────────────────────────
  swiftlint:
    name: SwiftLint
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint lint --strict --reporter github-actions-logging

  # ──────────────────────────────────────────────
  # Dependency Review (PR only)
  # ──────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write  # post review comments
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4.9.0
