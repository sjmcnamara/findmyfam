name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 8 * * 1'  # Every Monday 08:00 UTC

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.runner }}
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: swift
            runner: macos-15
          - language: kotlin
            runner: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      # ── Swift: install tooling BEFORE CodeQL init ─
      # brew install fails under Rosetta after CodeQL modifies the shell
      # environment for Swift tracing, so xcodegen must be installed first.
      - name: Install xcodegen (Swift)
        if: matrix.language == 'swift'
        run: brew install xcodegen

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13  # v4
        with:
          languages: ${{ matrix.language }}

      # ── Swift ────────────────────────────────────
      - name: Generate Xcode project (Swift)
        if: matrix.language == 'swift'
        run: xcodegen generate

      - name: Build (Swift)
        if: matrix.language == 'swift'
        run: |
          xcodebuild build \
            -project Whistle.xcodeproj \
            -scheme Whistle \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO

      # ── Kotlin ───────────────────────────────────
      - name: Set up Java (Kotlin)
        if: matrix.language == 'kotlin'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          distribution: temurin
          java-version: 17

      - name: Build (Kotlin)
        if: matrix.language == 'kotlin'
        working-directory: android
        run: ./gradlew assembleDebug

      # ── Analysis ─────────────────────────────────
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13  # v4
        with:
          category: "/language:${{ matrix.language }}"
