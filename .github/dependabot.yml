# Dependabot — auto-creates PRs when dependencies have updates or CVEs
# https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"

  # Swift Package Manager (WhistleCore + main app)
  - package-ecosystem: swift
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"

  # Gradle (Android)
  - package-ecosystem: gradle
    directory: /android
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
